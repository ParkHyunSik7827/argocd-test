apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-final-management
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/phs7827/argocd-test.git
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated: null # 자동 동기화 명시적 비활성화
