apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
      - name: spark-master
        image: spark:3.5.1
        command: ["/opt/spark/bin/spark-class"]
        args: ["org.apache.spark.deploy.master.Master"]
        ports:
        - containerPort: 8080
        - containerPort: 7077
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master-svc
  namespace: logging
spec:
  selector:
    app: spark-master
  ports:
  - name: webui
    port: 8080
    targetPort: 8080
  - name: cluster
    port: 7077
    targetPort: 7077
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
      - name: spark-worker
        image: spark:3.5.1
        command: ["/opt/spark/bin/spark-class"]
        args: ["org.apache.spark.deploy.worker.Worker", "spark://spark-master-svc:7077"]
        env:
        - name: SPARK_WORKER_MEMORY
          value: 1G
        - name: SPARK_WORKER_CORES
          value: "1"
