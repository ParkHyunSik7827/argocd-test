apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Elasticsearch
      type: elasticsearch
      access: proxy
      url: http://elasticsearch:9200
      database: "[processed_logs-]YYYY.MM.DD"
      jsonData:
        timeField: "@timestamp"
        interval: "Daily"
        esVersion: "7.17.3"
